<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="SovereignBrain - VaultMesh Productivity Dashboard. Alchemical Transformation Engine for Digital Sovereignty." />
    <meta name="color-scheme" content="dark" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <title>SovereignBrain | VaultMesh</title>

    <style>
      /* Prevent flash of unstyled content */
      html {
        background: #0a0a0f;
      }
      body {
        margin: 0;
        background: #0a0a0f;
        color: #e8e8ed;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading state */
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0a0a0f;
        color: #e8e8ed;
        font-family: 'Inter', sans-serif;
      }
      .loading-symbol {
        font-size: 64px;
        color: #d69e2e;
        animation: pulse 2s ease-in-out infinite;
        text-shadow: 0 0 20px #d69e2e;
      }
      .loading-text {
        margin-top: 16px;
        font-size: 14px;
        color: #6b6b7a;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run SovereignBrain.</noscript>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-symbol">&#9737;</div>
        <div class="loading-text">Initializing SovereignBrain...</div>
      </div>
    </div>
  </body>
</html>
